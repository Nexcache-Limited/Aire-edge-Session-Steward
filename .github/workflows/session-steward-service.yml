name: Session Steward Service

on:
  pull_request:
    paths:
      - "services/session-steward-service/**"
      - ".github/workflows/session-steward-service.yml"
  push:
    branches: [main]
    paths:
      - "services/session-steward-service/**"
      - ".github/workflows/session-steward-service.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/session-steward-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/session-steward-service/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --runInBand
      - run: npm run build
